name: Deploy to Devnet

on:
  push:
    branches: [master]

env:
  SOLANA_VERSION: "1.18.26"
  ANCHOR_VERSION: "0.31.1"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      alons_box: ${{ steps.changes.outputs.alons_box }}
      two_pills: ${{ steps.changes.outputs.two_pills }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed programs
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -q "^programs/alons-box/"; then
            echo "alons_box=true" >> $GITHUB_OUTPUT
          else
            echo "alons_box=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q "^programs/two-pills/"; then
            echo "two_pills=true" >> $GITHUB_OUTPUT
          else
            echo "two_pills=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.alons_box == 'true' || needs.detect-changes.outputs.two_pills == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --force

      - name: Setup deployer keypair
        run: echo '${{ secrets.DEPLOYER_KEYPAIR }}' > ~/.config/solana/id.json

      - name: Configure Solana for devnet
        run: solana config set --url devnet

      - run: anchor build

      - name: Deploy Alon's Box
        if: needs.detect-changes.outputs.alons_box == 'true'
        run: anchor deploy --provider.cluster devnet --program-name alons_box

      - name: Deploy Two Pills
        if: needs.detect-changes.outputs.two_pills == 'true'
        run: anchor deploy --provider.cluster devnet --program-name two_pills
